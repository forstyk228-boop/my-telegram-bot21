<!DOCTYPE html>
<html>
<head>
    <title>Phobos NFT App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        input, button { padding: 10px; margin: 10px; width: 80%; }
    </style>
</head>
<body>
    <h1>Выставить NFT</h1>
    <input type="text" id="name" placeholder="Название NFT">
    <input type="number" id="price" placeholder="Цена">
    <button onclick="sendData()">Отправить в бота</button>

    <script>
        function sendData() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            
            window.Telegram.WebApp.sendData(JSON.stringify({
                "action": "list_nft",
                "name": name,
                "price": price
            }));
            window.Telegram.WebApp.close();
        }
    </script>
</body>
</html>
