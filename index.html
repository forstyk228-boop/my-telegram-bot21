<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phobos NFT Manager</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #8b5cf6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            transition: var(--transition);
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: var(--card-bg); color: var(--text-color);
            cursor: pointer; transition: var(--transition);
        }
        .tab-btn.active { background: var(--accent); color: white; transform: scale(1.05); }

        .form-section { display: none; background: var(--card-bg); padding: 20px; border-radius: 20px; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }

        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #334155; background: var(--bg-color); color: var(--text-color);
            box-sizing: border-box;
        }
        button.submit {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
            margin-top: 10px; transition: var(--transition);
        }
        button.submit:hover { opacity: 0.9; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Phobos Vibe</h2>
        <button onclick="document.body.classList.toggle('light')">🌙/☀️</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('nft')">NFT</button>
        <button class="tab-btn" onclick="showTab('user')">User</button>
    </div>

    <!-- Форма NFT -->
    <div id="nft" class="form-section active">
        <h3>Выставить NFT</h3>
        <input type="text" id="nftName" placeholder="Название NFT">
        <input type="number" id="nftPrice" placeholder="Цена (руб)">
        <button class="submit" onclick="sendData('nft')">Отправить NFT</button>
    </div>

    <!-- Форма Юзер -->
    <div id="user" class="form-section">
        <h3>Выставить Username</h3>
        <input type="text" id="userName" placeholder="Ваш Username">
        <input type="number" id="userPrice" placeholder="Стоимость аренды">
        <button class="submit" onclick="sendData('user')">Отправить Юзера</button>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function showTab(id) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    function sendData(type) {
        let data = (type === 'nft') ? {
            action: "list_nft",
            name: document.getElementById('nftName').value,
            price: document.getElementById('nftPrice').value
        } : {
            action: "list_user",
            name: document.getElementById('userName').value,
            price: document.getElementById('userPrice').value
        };
        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
